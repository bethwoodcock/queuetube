<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QueueTube — Tags</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap');

    body {
      width: 380px;
      min-height: 200px;
      max-height: 580px;
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: 'DM Sans', "Segoe UI", sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      background: #cc0000;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    #header-logo-icon {
      width: 28px; height: 28px;
      background: rgba(255,255,255,0.18);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    #header-text { flex: 1; display: flex; flex-direction: column; gap: 0; }
    #header h1 { font-size: 13px; font-weight: 800; color: #fff; letter-spacing: -0.2px; font-family: 'Syne', sans-serif; line-height: 1.2; }
    #header-sub { font-size: 10px; color: rgba(255,255,255,0.6); font-weight: 500; letter-spacing: 0.3px; text-transform: uppercase; }

    #app { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    /* ── Search ── */
    #search-wrap { padding: 9px 10px 0; flex-shrink: 0; }
    #search-input {
      width: 100%; background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 6px;
      color: #e0e0e0; padding: 7px 12px; font-size: 13px; outline: none; transition: border-color 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    #search-input:focus { border-color: #555; }
    #search-input::placeholder { color: #444; }

    /* ── Tags bar ── */
    #tags-bar {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 8px 10px 6px; flex-shrink: 0; align-items: center;
    }
    .tag-pill {
      display: inline-flex; align-items: center; padding: 4px 12px;
      background: #1a1a1a; color: #fff; border: 1px solid #ff0000; border-radius: 100px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: background 0.13s, border-color 0.13s, transform 0.1s;
    }
    .tag-pill:hover { background: #2a0000; border-color: #ff3333; transform: scale(1.04); }
    .tag-pill:active { transform: scale(0.97); }

    #plus-btn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 11px;
      background: #2a2a2a; color: #888; border: 1px solid #333;
      border-radius: 100px; font-size: 11px; font-weight: 600; cursor: pointer;
      transition: background 0.13s, color 0.13s, transform 0.1s; flex-shrink: 0;
      white-space: nowrap;
    }
    #plus-btn:hover { background: #333; color: #ccc; transform: scale(1.04); }
    #plus-btn:active { transform: scale(0.97); }

    /* ── New tag slide-down ── */
    #new-tag-wrap {
      display: flex; align-items: center; gap: 6px; padding: 0 10px;
      max-height: 0; overflow: hidden; opacity: 0;
      transition: max-height 0.25s cubic-bezier(0.4,0,0.2,1), opacity 0.2s ease, padding 0.2s ease;
      flex-shrink: 0;
    }
    #new-tag-wrap.visible { max-height: 52px; opacity: 1; padding: 6px 10px 4px; }
    #new-tag-input {
      flex: 1; background: #1c1c1c; border: 1px solid #cc0000;
      border-radius: 12px; color: #fff; padding: 6px 11px; font-size: 13px; outline: none;
    }
    #new-tag-input::placeholder { color: #555; }
    #new-tag-confirm {
      background: #cc0000; color: #fff; border: none; border-radius: 12px;
      padding: 6px 13px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
      transition: background 0.13s;
    }
    #new-tag-confirm:hover { background: #aa0000; }
    #new-tag-cancel {
      background: #2a2a2a; color: #888; border: none; border-radius: 50%;
      width: 24px; height: 24px; font-size: 11px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: color 0.13s;
    }
    #new-tag-cancel:hover { color: #fff; }

    /* ── Channel list ── */
    #channel-list { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #2e2e2e transparent; padding: 2px 0 4px; }

    /* ── Footer ── */
    #footer { padding: 7px 12px; border-top: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    #channel-count { font-size: 11px; color: #444; }
    #settings-btn {
      background: none; border: none; color: #555; cursor: pointer;
      padding: 4px; border-radius: 5px; display: flex; align-items: center;
      transition: color 0.13s;
    }
    #settings-btn:hover { color: #ccc; }

    /* ── Tag view ── */
    #tag-view-header {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px; border-bottom: 1px solid #1e1e1e; flex-shrink: 0;
    }
    #back-btn { background: none; border: none; color: #888; font-size: 12px; cursor: pointer; padding: 3px 6px; border-radius: 6px; transition: color 0.13s; white-space: nowrap; }
    #back-btn:hover { color: #fff; }
    #tag-view-title { flex: 1; font-size: 15px; font-weight: 700; color: #ff5555; }
    #delete-tag-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 3px 5px; border-radius: 5px; opacity: 0.4; transition: opacity 0.13s; }
    #delete-tag-btn:hover { opacity: 1; }

    #members-section { flex-shrink: 0; border-bottom: 1px solid #1e1e1e; }
    #add-section { display: flex; flex-direction: column; flex: 1; overflow: hidden; min-height: 0; }

    .section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #555; padding: 7px 12px 4px; display: flex; align-items: center; gap: 6px; }
    .section-count { background: #cc0000; color: #fff; border-radius: 8px; padding: 0 6px; font-size: 10px; font-weight: 700; }

    #members-list { max-height: 130px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #2e2e2e transparent; }
    .member-row { display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-bottom: 1px solid #181818; }
    .member-row:hover { background: #151515; }
    .remove-btn {
      background: none; border: 1px solid #3a3a3a; color: #666;
      width: 22px; height: 22px; border-radius: 50%; cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: border-color 0.13s, color 0.13s; line-height: 1;
    }
    .remove-btn:hover { border-color: #ff4444; color: #ff4444; }

    #tag-search-wrap { padding: 7px 10px 4px; flex-shrink: 0; }
    #tag-search-input {
      width: 100%; background: #1c1c1c; border: 1px solid #2e2e2e; border-radius: 12px;
      color: #e0e0e0; padding: 6px 11px; font-size: 13px; outline: none; transition: border-color 0.15s;
    }
    #tag-search-input:focus { border-color: #555; }
    #tag-search-input::placeholder { color: #444; }

    #add-list { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #2e2e2e transparent; }
    .add-row { display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-bottom: 1px solid #181818; }
    .add-row:hover { background: #151515; }
    .add-btn {
      background: #cc0000; border: none; color: #fff; width: 22px; height: 22px;
      border-radius: 50%; cursor: pointer; font-size: 16px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: background 0.13s, transform 0.1s; line-height: 1;
    }
    .add-btn:hover { background: #aa0000; transform: scale(1.1); }
    .add-btn:active { transform: scale(0.93); }

    /* ── Settings view ── */
    #settings-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .settings-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-bottom: 1px solid #181818;
    }
    .settings-row:hover { background: #131313; }
    .settings-info { flex: 1; }
    .settings-title { font-size: 13px; font-weight: 600; color: #e0e0e0; margin-bottom: 2px; }
    .settings-desc { font-size: 11px; color: #555; line-height: 1.4; }
    .settings-action-btn {
      background: #1e1e1e; border: 1px solid #333; color: #bbb;
      border-radius: 8px; padding: 5px 12px; font-size: 12px; font-weight: 500;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: background 0.13s, border-color 0.13s, color 0.13s;
    }
    .settings-action-btn:hover { background: #2a2a2a; color: #fff; }
    .settings-action-btn.danger:hover { background: #2a0000; border-color: #cc0000; color: #ff6666; }

    #settings-toast {
      margin: 8px 12px 4px; padding: 7px 12px; background: #1a2a1a;
      color: #88dd88; border-radius: 8px; font-size: 12px; opacity: 0;
      transition: opacity 0.2s;
    }
    #settings-toast.visible { opacity: 1; }

    /* ── Channel row with inline tag dropdown ── */
    .channel-row {
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid #181818;
      cursor: pointer;  /* whole row is clickable */
    }
    .channel-row:hover { background: #151515; }
    .channel-row.row-open { background: #151515; }

    /* channel-row-main fills full width — click anywhere on it opens the dropdown */
    .channel-row-main {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      width: 100%;
      user-select: none;
    }

    /* Avatar circle */
    .ch-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: #2a2a2a; border: 1px solid #333;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #888;
      flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.3px;
    }

    .channel-name { flex: 1; font-size: 13px; color: #d8d8d8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .channel-tag-chips { display: flex; flex-wrap: wrap; gap: 3px; flex-shrink: 0; max-width: 140px; justify-content: flex-end; }

    .mini-chip {
      background: rgba(255,0,0,0.15); color: #ff6666; border-radius: 4px;
      padding: 2px 6px; font-size: 10px; font-weight: 600; white-space: nowrap;
      display: inline-flex; align-items: center; gap: 3px; cursor: pointer;
      transition: background 0.12s;
    }
    .mini-chip:hover { background: rgba(204,0,0,0.35); }
    .mini-chip-x { font-size: 11px; color: rgba(255,120,120,0.7); line-height: 1; }
    .mini-chip-x:hover { color: #ff4444; }

    /* Inline tag dropdown */
    .inline-tag-dropdown {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 0 10px;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.22s ease, opacity 0.18s ease, padding 0.18s ease;
    }
    .inline-tag-dropdown.open {
      max-height: 120px;
      opacity: 1;
      padding: 4px 10px 8px;
    }

    /* No tick — just red highlight for assigned state */
    .inline-tag-option {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #aaa;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .inline-tag-option:hover { background: #252525; color: #fff; border-color: #555; }
    .inline-tag-option.assigned {
      background: rgba(204,0,0,0.2);
      border-color: #cc0000;
      color: #ff8888;
    }
    .inline-tag-option.assigned:hover { background: rgba(204,0,0,0.35); }

    /* ── Shared ── */
    .empty-hint { padding: 14px; color: #444; font-size: 12px; text-align: center; }
    .loading { padding: 32px; text-align: center; color: #444; }
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px 22px; text-align: center; gap: 10px; color: #666; }
    .empty-icon { font-size: 36px; }
    .empty-state p { font-size: 13px; line-height: 1.6; }
    .empty-state a { color: #ff6666; text-decoration: none; font-weight: 500; }
    .empty-state a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="header">
    <div id="header-logo-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
    </div>
    <div id="header-text">
      <h1>QueueTube</h1>
      <span id="header-sub">Tag Manager</span>
    </div>
  </div>
  <div id="app">
    <div class="loading">Loading…</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
